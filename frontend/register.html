<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Flashcard Forge</title>
    <link rel="stylesheet" href="stylereg.css">
</head>
<body>
    <div class="container">
        <h1>Создать аккаунт</h1>
        <form action="/api/register" method="POST">
            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" name="username" required placeholder="Введите никнейм" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Электронная почта</label>
                <input type="email" name="email" required placeholder="example@mail.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required placeholder="••••••••" autocomplete="new-password">
            </div>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p><a href="login.html" class="back-link">Уже есть аккаунт? Войти</a></p>
        <p><a href="/" class="back-link">Вернуться на главную</a></p>
    </div>
</body>
</html>
