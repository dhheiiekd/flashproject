<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика - Flashcard Forge</title>
    <link rel="stylesheet" href="/dashboard.css?">
    <style>
        /* Отключаем видео-фон и задаем фиксированный темный цвет для body */
        body {
            background-color: #050b14 !important;
            background-image: radial-gradient(circle at center, #0a1526 0%, #050b14 100%);
            min-height: 100vh;
        }

        /* Стили, уникальные для страницы статистики */
        .stats-card {
            background: linear-gradient(135deg, rgba(11, 15, 25, 0.9) 0%, rgba(5, 11, 20, 0.95) 100%);
            border: 1px solid rgba(23, 183, 208, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .stats-summary {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .summary-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(23, 183, 208, 0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .summary-val {
            display: block;
            font-size: 32px;
            font-weight: bold;
            color: #26e6ff;
            text-shadow: 0 0 10px rgba(38, 230, 255, 0.4);
        }

        .summary-lbl {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            display: block;
        }

        .accordion-wrapper {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 15px;
        }

        .accordion-trigger {
            width: 100%;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 5px 0;
        }
        .accordion-trigger:hover { color: #26e6ff; }

        .accordion-trigger .arrow {
            transition: transform 0.3s ease;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .passed-decks-list {
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .passed-deck-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 28, 46, 0.5);
            border: 1px solid rgba(23, 183, 208, 0.15);
            border-radius: 6px;
            padding: 12px 16px;
        }

        .passed-deck-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .passed-deck-title {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
        }

        .passed-deck-comment { font-size: 12px; font-weight: 500; }
        .comment-warn { color: #ff9f43; } 
        .comment-success { color: #2ed573; } 

        .passed-deck-percent {
            font-size: 18px;
            font-weight: bold;
            color: #26e6ff;
        }

        @media (max-width: 768px) {
            .stats-summary { flex-direction: column; gap: 10px; }
            .summary-val { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header class="header-panel">
        <a href="/dashboard" class="btn profile-btn">↩ На главную</a>
    </header>

    <main class="dashboard-container">
        <h1 class="dashboard-title">Статитстика</h1>
        
        <div class="stats-card">
            <div class="stats-summary">
                <div class="summary-item">
                    <span class="summary-val" id="totalPassedDecks">0</span>
                    <span class="summary-lbl">Пройдено колод</span>
                </div>
                <div class="summary-item">
                    <span class="summary-val" id="overallKnowledge">0%</span>
                    <span class="summary-lbl">Общий уровень знаний</span>
                </div>
            </div>

            <div class="accordion-wrapper">
                <button class="accordion-trigger" id="toggleStatsBtn">
                    <span>Прогресс по колодам</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="accordion-content" id="statsContent">
                    <div class="passed-decks-list" id="passedDecksList">
                        <p style="color: rgba(255,255,255,0.4); text-align: center; margin: 0; padding: 10px;">
                            Вы пока не завершили ни одной сессии обучения.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/user_stats.js"></script>
</body>
</html>
